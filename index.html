<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mini ERP Patisserie</title>
<style>
body { font-family: Arial, sans-serif; background:#fdf6e3; padding:20px; }
h1 { color:#d35400; }
section { margin-bottom:30px; background:#fff8f0; padding:15px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
label { display:block; margin:5px 0 2px; }
input[type=number], select { width:100%; padding:5px; margin-bottom:10px; border-radius:4px; border:1px solid #ccc; }
button { padding:8px 12px; background:#d35400; color:white; border:none; border-radius:4px; cursor:pointer; }
button:hover { background:#e67e22; }
table { width:100%; border-collapse:collapse; margin-top:10px; }
th, td { border:1px solid #ccc; padding:8px; text-align:center; }
th { background:#f39c12; color:white; }
.alert { color:red; font-weight:bold; }
</style>
</head>
<body>

<h1>Mini ERP Patisserie</h1>

<section>
  <h2>Ajouter / Modifier Order</h2>
  <label for="product">Produit:</label>
  <select id="product">
    <option>Banana Cake</option>
    <option>Date Cake</option>
    <option>English Cake</option>
    <option>Brownies</option>
  </select>
  <label for="quantity">Quantité:</label>
  <input type="number" id="quantity" value="1">
  <button onclick="addOrder()">Ajouter / Modifier</button>
</section>

<section>
  <h2>Modifier Stock</h2>
  <label for="farine">Farine:</label>
  <input type="number" id="farine" value="10">
  <label for="sugar">Sugar:</label>
  <input type="number" id="sugar" value="869">
  <label for="eggs">Eggs:</label>
  <input type="number" id="eggs" value="14567">
  <button onclick="updateStock()">Update Stock</button>
</section>

<section>
  <h2>Orders</h2>
  <table id="ordersTable">
    <tr><th>Produit</th><th>Quantité</th></tr>
  </table>
</section>

<section>
  <h2>Stock & Consommation</h2>
  <table id="stockTable">
    <tr><th>Ingredient</th><th>Stock Initial</th><th>Consommation</th><th>Stock Restant</th><th>Alert</th></tr>
  </table>
</section>

<script>
// données initiales
let stock = {Farine:10, Sugar:869, Eggs:14567};
let orders = {};
let recettes = {
  "Banana Cake": {Farine:0.38, Sugar:0.2, Eggs:0.105},
  "Date Cake": {Farine:0.3, Sugar:0.18, Eggs:0.08},
  "English Cake": {Farine:0.25, Sugar:0.15, Eggs:0.06},
  "Brownies": {Farine:0.2, Sugar:0.25, Eggs:0.05}
};

// ajouter ou modifier order
function addOrder() {
  let prod = document.getElementById("product").value;
  let qty = parseInt(document.getElementById("quantity").value);
  orders[prod] = qty;
  renderOrders();
  renderStock();
}

// modifier stock
function updateStock() {
  stock.Farine = parseFloat(document.getElementById("farine").value);
  stock.Sugar = parseFloat(document.getElementById("sugar").value);
  stock.Eggs = parseFloat(document.getElementById("eggs").value);
  renderStock();
}

// عرض Orders Table
function renderOrders() {
  let table = document.getElementById("ordersTable");
  table.innerHTML = "<tr><th>Produit</th><th>Quantité</th></tr>";
  for(let prod in orders) {
    let row = table.insertRow();
    row.insertCell(0).innerText = prod;
    row.insertCell(1).innerText = orders[prod];
  }
}

// عرض Stock Table مع حساب الاستهلاك
function renderStock() {
  let table = document.getElementById("stockTable");
  table.innerHTML = "<tr><th>Ingredient</th><th>Stock Initial</th><th>Consommation</th><th>Stock Restant</th><th>Alert</th></tr>";
  for(let ing in stock) {
    let consommation = 0;
    for(let prod in orders) {
      consommation += (recettes[prod][ing] || 0) * orders[prod];
    }
    let restant = stock[ing] - consommation;
    let alert = restant < 0 ? "❌ Rupture!" : "";
    let row = table.insertRow();
    row.insertCell(0).innerText = ing;
    row.insertCell(1).innerText = stock[ing].toFixed(2);
    row.insertCell(2).innerText = consommation.toFixed(2);
    row.insertCell(3).innerText = restant.toFixed(2);
    row.insertCell(4).innerText = alert;
    if(alert) row.cells[4].classList.add("alert");
  }
}

// initial render
renderOrders();
renderStock();
</script>

</body>
</html>
